plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-factory_bot
  - rubocop-faker
  - rubocop-rspec

inherit_mode:
  merge:
    - Exclude

# General configuration for all cops
AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'db/migrate/**/*'
    - "db/schema.rb"
    - "bin/*"

# Style Cops
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Exclude:
    - "config/**/*"
    - "Gemfile"
    - "Rakefile"
    - "config.ru"

Style/HashSyntax:
  EnforcedShorthandSyntax: either

Style/StringLiterals:
  EnforcedStyle: double_quotes
  Include:
    - "app/**/*"
    - "config/**/*"
    - "lib/**/*"
    - "spec/**/*"
    - "test/**/*"
    - "Gemfile"

# Layout Cops
Layout/EndAlignment:
  EnforcedStyleAlignWith: variable

Layout/SpaceInsideBlockBraces:
  EnforcedStyleForEmptyBraces: space

Layout/LineLength:
  Max: 130

# Metrics Cops
Metrics/MethodLength:
  Max: 17

# RSpec Cops
RSpec/MultipleExpectations:
  Max: 5

RSpec/MultipleMemoizedHelpers:
  Max: 6

RSpec/ExampleLength:
  Max: 6